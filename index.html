    <style>
        :root {
            --bg-color: #000000;         /* Pure Black */
            --nav-bg: rgba(0, 0, 0, 0.85); 
            --text-main: #FFFFFF;        
            --text-muted: #888888;       
            --accent-red: #F02424;       /* Bold CAD Red */
            --line-color: #222222;       
            --max-width: 1200px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        ::selection { background-color: var(--accent-red); color: #fff; }

        /* --- NAVIGATION --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line-color);
        }

        .nav-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .brand span { color: var(--accent-red); }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s ease;
        }

        .nav-link:hover, .nav-link:focus { color: var(--accent-red); }

        .nav-link svg { width: 18px; height: 18px; fill: currentColor; }

        .btn-resume {
            border: 1px solid var(--line-color);
            padding: 0.5rem 1rem;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .btn-resume:hover {
            border-color: var(--accent-red);
            background: rgba(240, 36, 36, 0.1);
        }

        /* --- MAIN GALLERY --- */
        main {
            padding-top: 120px; 
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem; /* Spacing between slides */
        }

        .slide-wrapper {
            width: 90%;
            max-width: var(--max-width);
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide-wrapper.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .slide-image {
            width: 100%;
            height: auto;
            display: block;
            background-color: #111; 
            /* MILD WHITE DROP SHADOW */
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.08), 0 1px 3px rgba(255, 255, 255, 0.05);
        }

        /* --- FOOTER --- */
        footer {
            border-top: 1px solid var(--line-color);
            padding: 4rem 2rem;
            text-align: center;
        }

        .footer-content {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .footer-text {
            font-size: 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
        }

        .footer-contacts {
            display: flex;
            gap: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .footer-contacts a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-contacts a:hover { color: var(--accent-red); }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-container { padding: 1rem; }
            .brand { font-size: 1rem; }
            .nav-link span { display: none; }
            .nav-link.btn-resume span { display: inline; }
            main { gap: 3rem; padding-top: 90px; }
            .slide-wrapper { width: 95%; }
            .footer-contacts { flex-direction: column; gap: 1rem; }
        }

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const observerOptions = { root: null, rootMargin: '0px', threshold: 0.10 };
            
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target); 
                    }
                });
            }, observerOptions);

            const slides = document.querySelectorAll('.slide-wrapper');
            slides.forEach(slide => {
                if (prefersReducedMotion) {
                    slide.classList.add('is-visible'); 
                } else {
                    observer.observe(slide);
                }
            });
        });
    </script>
