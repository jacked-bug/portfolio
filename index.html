    <style>
        :root {
            --bg-color: #000000;         
            --nav-bg: rgba(0, 0, 0, 0.85); 
            --text-main: #FFFFFF;        
            --text-muted: #888888;       
            --accent-red: #F02424;       
            --line-color: #222222;       
            --max-width: 1200px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        ::selection { background-color: var(--accent-red); color: #fff; }

        /* --- NAVIGATION --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line-color);
        }

        .nav-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .brand span { color: var(--accent-red); }

        .nav-links { 
            display: flex; 
            gap: 1.75rem; /* Ensures equal, consistent spacing between all items */
            align-items: center; 
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s ease;
        }

        .nav-link:hover, .nav-link:focus { color: var(--accent-red); }
        .nav-link svg { width: 18px; height: 18px; fill: currentColor; }

        /* --- JUMP BUTTONS --- */
        .jump-container {
            padding-top: 120px; 
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding-inline: 2rem;
        }

        .jump-btn {
            background: transparent;
            border: 1px solid var(--line-color);
            color: var(--text-main); 
            padding: 0.6rem 1.5rem;
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 0.9rem;
            font-weight: 700; 
            letter-spacing: 0.5px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .jump-btn:hover {
            border-color: var(--text-main); 
            background: rgba(255, 255, 255, 0.05); 
        }

        .jump-btn.active {
            color: var(--text-main);
            border-color: var(--accent-red);
            background: rgba(240, 36, 36, 0.15); 
        }

        /* --- MAIN GALLERY --- */
        main {
            padding-top: 40px; 
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem; 
        }

        .slide-wrapper {
            width: 90%;
            max-width: var(--max-width);
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            scroll-margin-top: 140px;
        }

        .slide-wrapper.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .slide-image {
            width: 100%;
            height: auto;
            display: block;
            background-color: #111; 
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.08), 0 1px 3px rgba(255, 255, 255, 0.05);
        }

        /* --- FLOATING UI (Counter & Top Button) --- */
        .slide-counter {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--nav-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--line-color);
            padding: 0.5rem 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-main);
            z-index: 90;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none; 
        }
        .slide-counter span { color: var(--text-muted); }

        .back-to-top {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            background: var(--nav-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--line-color);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            cursor: pointer;
            z-index: 90;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
        }

        .back-to-top.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .back-to-top:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .back-to-top svg { width: 20px; height: 20px; fill: currentColor; }

        /* --- FOOTER --- */
        footer {
            border-top: 1px solid var(--line-color);
            padding: 6rem 2rem;
        }

        .footer-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
            text-align: left;

        .footer-profile-pic {

            border: 2px solid var(--line-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0; 
        }

        .footer-text-block {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;

        .footer-heading { 
            font-size: 2rem; 
            font-family: 'Space Grotesk', sans-serif;

            color: var(--text-main);
            line-height: 1.2;

        .footer-subtext {

        /* --- RESPONSIVE --- */

            .back-to-top { bottom: 1rem; left: 1rem; width: 38px; height: 38px; }
            
            .footer-content { flex-direction: column; text-align: center; gap: 1.5rem; }
            .footer-profile-pic { width: 120px; height: 120px; }
            .footer-text-block { align-items: center; }
            .footer-heading { font-size: 1.6rem; }
            .footer-subtext { font-size: 1rem; }
        }

    <!-- INTERACTIVITY SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const backToTopBtn = document.getElementById('backToTop');
            
            window.addEventListener('scroll', () => {
                if (window.scrollY > 500) {
                    backToTopBtn.classList.add('visible');
                } else {
                    backToTopBtn.classList.remove('visible');
                }
            });

            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                jumpBtns.forEach(b => b.classList.remove('active'));
            });

            const jumpBtns = document.querySelectorAll('.jump-btn');
            
            jumpBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    jumpBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const targetId = btn.getAttribute('data-target');
                    const targetEl = document.getElementById(targetId);
                    
                    if (targetEl) {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });

            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const allSlides = document.querySelectorAll('.slide-wrapper');
            const counterEl = document.getElementById('slideCounter');

            const revealObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target); 
                    }
                });
            }, { root: null, rootMargin: '0px', threshold: 0.10 });

            const activeSlideObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const slideId = entry.target.id;
                        const slideNumber = slideId.split('-')[1]; 
                        counterEl.innerHTML = `${slideNumber} <span>/ 36</span>`;
                        
                        if(parseInt(slideNumber) === 36) {
                            counterEl.style.opacity = '0.5';
                        } else {
                            counterEl.style.opacity = '1';
                        }
                    }
                });
            }, { rootMargin: '-40% 0px -40% 0px' }); 

            allSlides.forEach(slide => {
                if (prefersReducedMotion) {
                    slide.classList.add('is-visible');
                } else {
                    revealObserver.observe(slide);
                }
                activeSlideObserver.observe(slide);
            });
        });
    </script>
